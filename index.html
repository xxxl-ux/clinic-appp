<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>診所帳務系統</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #ffffff; --blue: #58a6ff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-top: env(safe-area-inset-top); padding-bottom: 100px; }
        .header { padding: 10px 0 20px; border-bottom: 1px solid #30363d; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 22px; color: var(--blue); }
        .patient-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: var(--card); color: white; margin-top: 15px; box-sizing: border-box; font-size: 16px; }
        .item-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #30363d; }
        .controls { display: flex; align-items: center; gap: 15px; }
        .btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #30363d; color: white; font-size: 20px; font-weight: bold; }
        .count { font-size: 18px; width: 25px; text-align: center; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #30363d; padding-bottom: calc(env(safe-area-inset-bottom) + 15px); }
        .total { color: #d29922; font-size: 22px; font-weight: bold; }
        .save-btn { background: var(--blue); color: white; padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2>🏥 診所帳務系統</h2>
    <input type="text" id="patientName" class="patient-input" placeholder="請輸入病人姓名">
</div>

<div id="itemList"></div>

<div class="footer">
    <div class="total" id="totalPrice">總計: $0</div>
    <button class="save-btn" onclick="saveData()">儲存紀錄</button>
</div>

<script>
    const items = [
        {name: "胃加腸鏡", price: 1400}, {name: "胃鏡", price: 500},
        {name: "腸鏡", price: 800}, {name: "CLO", price: 50},
        {name: "胃切片", price: 100}, {name: "胃 Cold Snare", price: 700},
        {name: "腸切片", price: 100}, {name: "腸 Cold Snare", price: 700},
        {name: "腹部超音波", price: 200}
    ].map(i => ({...i, count: 0}));

    function render() {
        let html = '';
        let total = 0;
        items.forEach((item, index) => {
            total += item.price * item.count;
            html += `
                <div class="item-card">
                    <div>
                        <div style="font-size:16px">${item.name}</div>
                        <div style="color:#8b949e; font-size:13px">$${item.price}</div>
                    </div>
                    <div class="controls">
                        <button class="btn" onclick="update(${index}, -1)">-</button>
                        <span class="count">${item.count}</span>
                        <button class="btn" onclick="update(${index}, 1)">+</button>
                    </div>
                </div>`;
        });
        document.getElementById('itemList').innerHTML = html;
        document.getElementById('totalPrice').innerText = `總計: $${total}`;
    }

    function update(index, change) {
        items[index].count = Math.max(0, items[index].count + change);
        render();
    }

    function saveData() {
        const name = document.getElementById('patientName').value;
        if(!name) {
            alert("請先輸入病人姓名！");
            return;
        }
        alert("病人「" + name + "」紀錄儲存成功！");
    }

    render();
</script>
</body>
</html>
